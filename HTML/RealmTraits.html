        <script>
            var bronzeArray = [
                "ancient_cave",
                "castle_ruins",
                "crystal_forest",
                "hidden_wellspring",
                "crimson_fane",
                "barren_wellspring"
            ];
            var silverArray = [
                "lost_tomb",
                "magma_forge",
                "secret_temple",
                "lava_prison",
                "archon_observatory",
                "forsaken_temple"
            ];
            var goldArray = [
                "golden_ziggurat",
                "lost_wizard_tower",
                "world_tree",
                "vaultsphere",
                "giants_throne",
                "rose_choked_palace",
                "withered_tree",
                "fractured_tower"
            ];

            function HandlePage() {
                showRealmTraits();
                SetLevelUpStuff();
            }

            async function showRealmTraits() {
                const realmTraits = new Set();
                for (const entry of jsonAllFromPOLocalized) {
                    // console.log(entry);
                    if (entry.id.indexOf("META_EMPIRE@TRAIT") != -1) {
                        realmTraits.add(entry);
                    }
                }
                console.log(realmTraits);

                const array = Array.from(realmTraits);
                let cards = await spawnSpellCards(array);

                for (let i = 0; i < array.length; i++) {
                    showRealmTrait(array[i], cards[i]);
                }
            }

            function showRealmTrait(trait, divOrigin) {
                const traitEN = trait;

                if (traitEN != undefined) {
                    const modName = divOrigin.querySelector("#modname");
                    let nameString = "";
                    if(trait.name == undefined){
                        return;
                    }
                    nameString = traitEN.name.toUpperCase();
                   // nameString += "<br>" + traitEN.category;

                    modName.innerHTML = nameString;
                    // backtracktome

                    modName.className = "mod_name";
                    let descriptionDiv = divOrigin.querySelector("#moddescription");
                 

                    let description = traitEN.description ? traitEN.description: traitEN.trait_description;
                    
                    description = description ? description :traitEN.desc;
                    const imagelink = divOrigin.querySelector("#modicon");

                    imagelink.setAttribute("src", "/aow4db/Icons/EmpireProgressionIcons/" + traitEN.id + ".png");

                    imagelink.setAttribute("style", "background-image: none");
                    descriptionDiv.innerHTML = description;
                    descriptionDiv.setAttribute("style", "max-width: 380px");

                    const unitTypesDiv = divOrigin.querySelector("#affectUnitTypes");

                   
                    const tier = divOrigin.querySelector("#modtier");

                    tier.innerHTML = "";

                    const cost = divOrigin.querySelector("#modcost");
                    cost.innerHTML = "";
                }
            }
        </script>

        <title>Age of Wonders 4 Database - Ancient Wonders</title>
    </head>

                <button id="Gold-button" class="w3-bar-item w3-button tablink" onclick="openDiv(event,'Gold')">

            </div>
            <div id="dataHolder" style="margin-top: -150px">

            </div>
