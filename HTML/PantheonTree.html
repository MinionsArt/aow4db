        <script>
            function HandlePage() {
                SetUpPantheonTrees(jsonPantheon);
            }

            // ── Pantheon Tree Renderer ────────────────────────────────────────────────────

            function SetUpPantheonTrees(jsonPantheonItems, iconBasePath = "/aow4db/Icons/Pantheon") {
                // Group items by tree_name

                const treeGroups = new Map();
                for (const item of jsonPantheonItems) {
                    const name = item.tree_name ?? "Ungrouped";
                    if (!treeGroups.has(name)) treeGroups.set(name, []);
                    treeGroups.get(name).push(item);
                }

                // Build a flat id→item lookup for line drawing

                // Find or create a root container
                const root = document.getElementById("treespace") ?? document.body;
                const root2 = document.getElementById("treespace2") ?? document.body;

                for (const [treeName, rawItems] of treeGroups) {
                    const items = normalisedPositions(rawItems); // ← here, replaces rawItems from this point on
                    const itemById = new Map(items.map((item) => [item.id, item]));

                    const wrapper = document.createElement("DIV");

                    wrapper.className = "pantheon-tree-wrapper";

                    const title = document.createElement("H3");
                    title.className = "pantheon-tree-title";
                    title.textContent = treeName;
                    wrapper.appendChild(title);

                    // Two layers — nodes on top, lines behind (same pattern as your hero builder)
                    const lineHolder = document.createElement("DIV");
                    lineHolder.className = "pantheon-line-holder";
                    lineHolder.style.cssText =
                        "position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;";

                    const nodeHolder = document.createElement("DIV");
                    nodeHolder.className = "pantheon-node-holder";
                    nodeHolder.style.cssText = "position:relative;";

                    wrapper.appendChild(lineHolder);
                    wrapper.appendChild(nodeHolder);
                    if (treeName.indexOf("Page 2") != -1) {
                        root2.appendChild(wrapper);
                    } else {
                        root.appendChild(wrapper);
                    }

                    // Render all nodes first so DOM positions exist for line drawing
                    for (const item of items) {
                        BuildPantheonNode(item, nodeHolder, iconBasePath);
                    }

                    // Then draw lines (DOM must exist for both endpoints)
                    for (const item of items) {
                        if (!item.required_skills?.length) continue;
                        for (const req of item.required_skills) {
                            const source = itemById.get(req.id);
                            if (source) {
                                DrawPantheonLine(source, item, lineHolder);
                            } else {
                                console.warn(`Pantheon: missing required node "${req.id}" for "${item.id}"`);
                            }
                        }
                    }

                    // Resize wrapper to fit its contents (same as your resizeParentToFitChildren)
                    resizePantheonWrapper(nodeHolder);
                }
            }

            function normalisedPositions(items) {
                const minX = Math.min(...items.map((i) => i.tree_pos_x));
                const minY = Math.min(...items.map((i) => i.tree_pos_y));
                const PAD = 40;
                return items.map((i) => ({
                    ...i,
                    tree_pos_x: i.tree_pos_x - minX + PAD,
                    tree_pos_y: i.tree_pos_y - minY + PAD
                }));
            }

            function BuildPantheonNode(item, holder, iconBasePath) {
                const node = document.createElement("DIV");

                node.setAttribute("id", "pantheon_" + item.id);
                node.setAttribute(
                    "style",
                    `position:absolute; left:${item.tree_pos_x - 10}px; top:${item.tree_pos_y - 50}px;`
                );
                // change background based on type

                if (item.id.endsWith("_trait")) {
                    node.className = "unittype_ic shape-trait pantheon-node";
                }
                if (item.id.endsWith("_origin")) {
                    node.className = "unittype_ic shape-origin pantheon-node";
                    const TagIcon = document.createElement("div");
                    TagIcon.innerHTML = "<hero></hero>";
                    TagIcon.className = "TypeTag";

                    node.appendChild(TagIcon);
                }
                if (item.id.endsWith("_mount")) {
                    node.className = "unittype_ic shape-mount pantheon-node"; // add shape

                    const TagIcon = document.createElement("div");
                    TagIcon.innerHTML = "<mountSpecial></mountSpecial>";
                    TagIcon.className = "TypeTag";

                    node.appendChild(TagIcon);
                }
                if (item.icon.endsWith("_banner")) {
                    node.className = "unittype_ic shape-banner pantheon-node";
                }

                if (item.id.endsWith("_infusion")) {
                    node.className = "unittype_ic shape-infusion pantheon-node"; // add shape

                    const TagIcon = document.createElement("div");
                    TagIcon.innerHTML = "<bindingessence></bindingessence>";
                    TagIcon.className = "TypeTag";

                    node.appendChild(TagIcon);
                }
                if (item.id.endsWith("_weapon")) {
                    node.className = "unittype_ic shape-weapon pantheon-node"; // add shape
                    const TagIcon = document.createElement("div");
                    TagIcon.innerHTML = "<mp></mp>";
                    TagIcon.className = "TypeTag";

                    node.appendChild(TagIcon);
                }
                if (item.id.endsWith("_trinket")) {
                    node.className = "unittype_ic shape-trinket pantheon-node"; // add shape
                }
                if (item.id.endsWith("_outfit") || item.icon.endsWith("_outfit")) {
                    node.className = "unittype_ic shape-outfit pantheon-node"; // add shape
                    const TagIcon = document.createElement("div");
                    TagIcon.innerHTML = "<mp></mp>";
                    TagIcon.className = "TypeTag";

                    node.appendChild(TagIcon);
                }

                // Icon
                const img = document.createElement("IMG");
                img.className = "empireNodeIcon";
                img.setAttribute("src", `${iconBasePath}/${item.icon}.png`);
                img.setAttribute("height", "50px");
                node.appendChild(img);

                // Tooltip — uses your existing tooltip system if extraLookup is present,
                // otherwise falls back to the icon name

                const tooltipSpan = document.createElement("SPAN");
                let title = "";
                let description = "";
                if (item.extraLookup) {
                    // Hook into your existing lookup here if you have one, e.g.:
                    // tooltipSpan.innerHTML = BuildPantheonTooltip(item.extraLookup);
                    const lookup = findBy(jsonAllFromPOLocalized, "id", item.extraLookup);

                    let name = "";
                    let innerText = "";
                    if (lookup == undefined) {
                        console.log("couldnt find extralookup " + item.id);
                        return;
                    }
                    if (lookup.name != undefined) {
                        name = lookup.name;
                    }
                    if (lookup.trait_name != undefined) {
                        name = lookup.trait_name;
                    }
                    if (lookup.origin_name != undefined) {
                        name = lookup.origin_name;
                    }

                    if (lookup.description != undefined) {
                        innerText = lookup.description;
                    }
                    if (lookup.trait_description != undefined) {
                        innerText = lookup.trait_description;
                    }
                    if (lookup.origin_description != undefined) {
                        innerText = lookup.origin_description;
                    }

                    description = innerText;
                    title = `<span style="color:#d7c297">${name.toUpperCase()}</span>`;
                } else if (item.extraLookupExplicit) {
                    const mainName = findBy(jsonAllFromPOLocalized, "id", item.extraLookupExplicit)[item.suffix];
                    title = `<span style="color:#d7c297">${mainName.toUpperCase()}</span>`;
                } else {
                    const mainName = findBy(jsonAllFromPOLocalized, "id", "META_EMPIRE@PROGRESSION_ITEM")[item.id];
                    if (mainName == undefined) {
                        console.log("couldnt find " + item.id);
                        return;
                    }
                    title = `<span style="color:#d7c297">${mainName.toUpperCase()}</span>`;
                }

                tooltipSpan.innerHTML = title + "<br>" + description;

                const imgTooltip = document.createElement("IMG");

                imgTooltip.setAttribute("src", `${iconBasePath}/${item.icon}.png`);
                imgTooltip.setAttribute("height", "100px");
                tooltipSpan.appendChild(imgTooltip);
                addTooltipListeners(img, tooltipSpan); // your existing tooltip fn

                if (item.DLC) {
                    let newDivForMount = AddDLCTag(item.DLC);
                    newDivForMount.setAttribute("style", "");
                    newDivForMount.className = "DLCTAG";
                    node.appendChild(newDivForMount);
                }

                holder.appendChild(node);
            }

            function DrawPantheonLine(source, target, lineHolder) {
                const sourceEl = document.getElementById("pantheon_" + source.id);
                const targetEl = document.getElementById("pantheon_" + target.id);
                if (!sourceEl || !targetEl) return;

                // Centre of each node (offsetLeft/Top + half node size)
                const NODE_HALF = 25; // half of your ~50px node

                const x1 = source.tree_pos_x + NODE_HALF;
                const y1 = source.tree_pos_y + NODE_HALF;
                const x2 = target.tree_pos_x + NODE_HALF;
                const y2 = target.tree_pos_y + NODE_HALF;

                const dx = x2 - x1;
                const dy = y2 - y1;
                const angle = Math.atan2(dy, dx) * (180 / Math.PI);
                const length = Math.sqrt(dx * dx + dy * dy);

                const line = document.createElement("DIV");
                line.className = "branch-line"; // reuse your existing CSS class
                line.dataset.source = source.id;
                line.dataset.target = target.id;
                line.setAttribute(
                    "style",
                    `position:absolute;` +
                        `left:${x1}px;` +
                        `top:${y1}px;` +
                        `width:${length}px;` +
                        `transform:rotate(${angle}deg);` +
                        `transform-origin:0 50%;` +
                        `background-color:#00b7fdc4;` // dimmer than hero tree — adjust to taste
                );

                lineHolder.appendChild(line);
            }

            function resizePantheonWrapper(nodeHolder) {
                // Same logic as your resizeParentToFitChildren but works on the nodeHolder
                // since that has the absolutely-positioned children
                let maxRight = 0,
                    maxBottom = 0;
                for (const child of nodeHolder.children) {
                    maxRight = Math.max(maxRight, child.offsetLeft + child.offsetWidth);
                    maxBottom = Math.max(maxBottom, child.offsetTop + child.offsetHeight);
                }
                const PADDING = 30;
                nodeHolder.style.width = maxRight + PADDING + "px";
                nodeHolder.style.height = maxBottom + PADDING + "px";
            }

            function applyPantheonFilters() {
                const checkboxes = document.querySelectorAll(".pantheon-filter");

                // Build a set of active types
                const activeTypes = new Set();
                checkboxes.forEach((cb) => {
                    if (cb.checked) activeTypes.add(cb.dataset.type);
                });

                // Update the "All" checkbox state
                const allBox = document.getElementById("filterAll");
                allBox.checked = activeTypes.size === checkboxes.length;
                allBox.indeterminate = activeTypes.size > 0 && activeTypes.size < checkboxes.length;

                // Dim nodes that don't match any active type
                document.querySelectorAll(".pantheon-node").forEach((node) => {
                    const nodeType = getNodeType(node);
                    const visible = activeTypes.has(nodeType);
                    node.style.opacity = visible ? "1" : "0.35";
                    node.style.filter = visible ? "saturate(1)" : "saturate(0)";
                    node.style.pointerEvents = visible ? "" : "none";
                });
            }

            function toggleAllFilters(checked) {
                document.querySelectorAll(".pantheon-filter").forEach((cb) => {
                    cb.checked = checked;
                });
                applyPantheonFilters();
            }

            function getNodeType(node) {
                // Read the type from the shape-* class, e.g. "shape-infusion" → "infusion"
                const shapeClass = [...node.classList].find((c) => c.startsWith("shape-"));
                return shapeClass ? shapeClass.replace("shape-", "") : "unknown";
            }
        </script>

        <div class="tome_name">Pantheon Rewards</div>
        <div style="height: auto; color: white; text-align: center"></div>

        <div class="textblocktitle">
            <div style="display: flex; flex-direction: row; justify-content: space-evenly">
                <div id="pantheonFilters">
                    <label class="filter-toggle-all">
                        <input type="checkbox" id="filterAll" checked onchange="toggleAllFilters(this.checked)" />
                        All
                    </label>
                    <span class="filter-divider">|</span>
                    <label class="filter-label filter-trait">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="trait"
                            checked
                            onchange="applyPantheonFilters()" />
                        Trait
                    </label>
                    <label class="filter-label filter-origin">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="origin"
                            checked
                            onchange="applyPantheonFilters()" />
                        Origin
                    </label>
                    <label class="filter-label filter-infusion">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="infusion"
                            checked
                            onchange="applyPantheonFilters()" />
                        <bindingessence></bindingessence>Infusion
                    </label>
                    <label class="filter-label filter-weapon">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="weapon"
                            checked
                            onchange="applyPantheonFilters()" />
                        Weapon
                    </label>
                    <label class="filter-label filter-trinket">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="trinket"
                            checked
                            onchange="applyPantheonFilters()" />
                        Trinket
                    </label>
                    <label class="filter-label filter-outfit">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="outfit"
                            checked
                            onchange="applyPantheonFilters()" />
                        Outfit
                    </label>
                    <label class="filter-label filter-mount">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="mount"
                            checked
                            onchange="applyPantheonFilters()" />
                        Mount
                    </label>
                    <label class="filter-label filter-banner">
                        <input
                            type="checkbox"
                            class="pantheon-filter"
                            data-type="banner"
                            checked
                            onchange="applyPantheonFilters()" />
                        Banner
                    </label>
                </div>
            </div>
        </div>

        <div class="tome_name">Page 1</div>
        <div class="tree-space" id="treespace"></div>
        <div class="tome_name">Page 2</div>
        <div class="tree-space" id="treespace2"></div>
